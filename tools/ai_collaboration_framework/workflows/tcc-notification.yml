*This issue was automatically created for audit trail purposes*
*${apiStatus === 'success' ? 'OCC has already processed this violation' : 'Manual intervention required'}*`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 OCC ${statusText} - TCC Report ${new Date().toISOString().split('T')[0]}`,
              body: issueBody,
              labels: ['tcc-report', 'occ-activation', 'automated', apiStatus === 'success' ? 'occ-success' : 'occ-failed']
            });

            console.log(`Created audit issue #${issue.data.number}`);

      - name: Create manual activation issue (Manual mode)
        if: |
          steps.check-reports.outputs.found == 'true' &&
          steps.read-config.outputs.activation_mode == 'manual'
        uses: actions/github-script@v7
        with:
          script: |
            const reportPath = '${{ steps.check-reports.outputs.report_path }}';
            const summary = `${{ steps.check-reports.outputs.summary }}`;
            const timestamp = new Date().toISOString();

            const issueBody = `## 🚨 TCC Violation Report Detected

**Activation Mode:** Manual (Free)
**Report Location:** \`${reportPath}\`
**Detection Time:** ${timestamp}
**Branch:** \`${{ github.ref_name }}\`
**Commit:** \`${{ github.sha }}\`

---

### 📋 Quick Actions

**Option 1: Use OCC Launcher (Fastest - 3 clicks, FREE)**
1. Open the [OCC Launcher](https://github.com/${{ github.repository }}/blob/main/tools/ai_collaboration_framework/occ-launcher.html) (download and open in browser)
2. Click "Copy OCC Activation Prompt"
3. Click "Open Claude.ai" and paste

**Option 2: Manual Activation**
Copy this prompt and paste into Claude.ai:

\`\`\`
I am the Operational Control Claude (OCC) for the AI Collaboration Framework.

TASK: Check for and respond to latest TCC (Technical Control Claude) reports

INSTRUCTIONS:
1. Read all files in docs/ai_communication/ directory
2. Look for the most recent TCC report (sorted by timestamp)
3. Review any violations or issues documented
4. If violations found: Take immediate corrective action following OCC protocols
5. If no violations: Confirm framework status is healthy

FRAMEWORK LOCATION: The ${{ github.repository }} repository contains the framework in:
- docs/ai_communication/ - All TCC reports and communication logs
- docs/ai_collaboration_framework.md - Protocol documentation
- .github/workflows/ - Automation systems

Begin by checking the latest TCC report and respond accordingly.
\`\`\`

---

### 📊 Report Preview

\`\`\`
${summary}
\`\`\`

[View Full Report](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/${reportPath})

