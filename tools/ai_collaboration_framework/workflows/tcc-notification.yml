### 💡 Want Automated Activation?

This framework can automatically activate OCC via API!

**To enable:**
1. Get Anthropic API key from https://console.anthropic.com
2. Add to GitHub Secrets: \`ANTHROPIC_API_KEY\`
3. Edit \`tools/ai_collaboration_framework/config.yml\`
4. Change \`activation_mode: "manual"\` to \`activation_mode: "api"\`

Cost: ~$3-15 per activation | Time: Instant | Zero clicks needed

---

### 🔗 Quick Links
- [Open Claude.ai](https://claude.ai/new)
