- [Framework Documentation](https://github.com/${{ github.repository }}/blob/main/tools/ai_collaboration_framework/docs/AI_COLLABORATION_FRAMEWORK.md)
- [API Setup Guide](https://github.com/${{ github.repository }}/blob/main/tools/ai_collaboration_framework/docs/API_SETUP.md)

---

*This issue was automatically created by the AI Collaboration Framework*
*Close this issue once violations have been addressed*`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 OCC Activation Required - TCC Report ${new Date().toISOString().split('T')[0]}`,
              body: issueBody,
              labels: ['tcc-report', 'occ-activation', 'manual-mode']
            });

            console.log(`Created manual activation issue #${issue.data.number}`);

      - name: Comment on commit
        if: steps.check-reports.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const mode = '${{ steps.read-config.outputs.activation_mode }}';
            const apiStatus = '${{ steps.api-activation.outputs.status }}';

            let message = '🤖 TCC violation report detected. ';

            if (mode === 'api') {
              if (apiStatus === 'success') {
                message += 'OCC was automatically activated and fixes have been applied. ✅';
              } else {
                message += 'OCC activation failed. Check Actions logs and Issues for details. ❌';
              }
            } else {
              message += 'Check Issues tab for OCC activation instructions. 📋';
            }

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: message
            });
