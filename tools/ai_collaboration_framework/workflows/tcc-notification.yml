name: TCC Violation Handler (Hybrid)

# This workflow handles TCC violation reports in two modes:
# - Manual mode: Creates GitHub issue for human to activate OCC
# - API mode: Automatically activates OCC via Anthropic API

on:
  push:
    branches:
      - 'claude/**'  # Triggers on any claude/ branch pushes
    paths:
      - 'docs/ai_communication/**'
      - 'docs/occ_communication/**'
  workflow_dispatch:  # Manual trigger option

jobs:
  handle-violations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Need full history for git operations

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yq curl

      - name: Check for TCC reports
        id: check-reports
        run: |
          # Find the most recent TCC report
          LATEST_REPORT=$(find docs/ai_communication docs/occ_communication -name "VALIDATION_REPORT_*.md" -o -name "*VIOLATION*.md" 2>/dev/null | sort -r | head -1)

          if [ -n "$LATEST_REPORT" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "report_path=$LATEST_REPORT" >> $GITHUB_OUTPUT

            # Extract report summary
            SUMMARY=$(head -20 "$LATEST_REPORT" | tail -15)
            echo "summary<<EOF" >> $GITHUB_OUTPUT
            echo "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Read framework configuration
        id: read-config
        if: steps.check-reports.outputs.found == 'true'
        run: |
          CONFIG_FILE="tools/ai_collaboration_framework/config.yml"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Config file not found, using defaults"
            echo "activation_mode=manual" >> $GITHUB_OUTPUT
            echo "create_issues=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Read activation mode
          ACTIVATION_MODE=$(yq eval '.activation_mode' "$CONFIG_FILE" 2>/dev/null || echo "manual")
          echo "activation_mode=$ACTIVATION_MODE" >> $GITHUB_OUTPUT

          # Read GitHub settings
          CREATE_ISSUES=$(yq eval '.github.create_issues' "$CONFIG_FILE" 2>/dev/null || echo "true")
          echo "create_issues=$CREATE_ISSUES" >> $GITHUB_OUTPUT

          echo "Configuration loaded:"
          echo "  Activation mode: $ACTIVATION_MODE"
          echo "  Create issues: $CREATE_ISSUES"

      - name: Activate OCC via API (Automated Mode)
        id: api-activation
        if: |
          steps.check-reports.outputs.found == 'true' &&
          steps.read-config.outputs.activation_mode == 'api'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🤖 Automated mode: Activating OCC via API..."

          # Check for API key
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "❌ ERROR: ANTHROPIC_API_KEY secret not set"
            echo "Please add your Anthropic API key to repository secrets"
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "error=API key not configured" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Run OCC activation script
          cd tools/ai_collaboration_framework
          ./scripts/activate-occ-api.sh "${{ steps.check-reports.outputs.report_path }}"

          if [ $? -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ OCC activated successfully via API"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "error=Script execution failed" >> $GITHUB_OUTPUT
            echo "❌ OCC activation failed"
            exit 1
          fi

      - name: Create audit issue (API mode)
        if: |
          steps.check-reports.outputs.found == 'true' &&
          steps.read-config.outputs.activation_mode == 'api' &&
          steps.read-config.outputs.create_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const reportPath = '${{ steps.check-reports.outputs.report_path }}';
            const summary = `${{ steps.check-reports.outputs.summary }}`;
            const timestamp = new Date().toISOString();
            const apiStatus = '${{ steps.api-activation.outputs.status }}';

            const statusEmoji = apiStatus === 'success' ? '✅' : '❌';
            const statusText = apiStatus === 'success' ? 'Successfully Activated' : 'Activation Failed';

            const issueBody = `## 🤖 OCC Automated Activation ${statusEmoji}

**Status:** ${statusText}
**Activation Method:** API (Automated)
**Report Location:** \`${reportPath}\`
**Detection Time:** ${timestamp}
**Branch:** \`${{ github.ref_name }}\`
**Commit:** \`${{ github.sha }}\`

---

### 📊 Report Summary

\`\`\`
${summary}
\`\`\`

[View Full Report](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/${reportPath})

---

### 🔄 Automated Actions Taken

${apiStatus === 'success' ? `
- ✅ OCC was automatically activated via Anthropic API
- ✅ Claude analyzed the violation report
- ✅ Fixes have been applied and committed
- ✅ Response saved to docs/ai_communication/

**Next Steps:**
- Check the latest commits for OCC's fixes
- Review docs/ai_communication/ for OCC's response
- TCC will re-validate automatically
` : `
- ❌ Automated activation failed
- 🔧 Error: ${{ steps.api-activation.outputs.error }}

**Manual Fallback Required:**
Use the OCC Launcher or manual activation below.
`}

---

